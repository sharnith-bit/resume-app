apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resume-app
  template:
    metadata:
      labels:
        app: resume-app
    spec:
      containers:
      - name: resume-app
        image: resume-app:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        
